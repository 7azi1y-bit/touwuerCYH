              'https://image2url.com/r2/default/images/1772517419905-c67962aa-8f5b-405c-8c80-4c0c430055fe.jpg',
              'https://image2url.com/r2/default/images/1772517654912-0b9e5582-cc00-4090-be8f-67852ae29e66.jpg',

              'https://image2url.com/r2/default/images/1772518216458-dc9521e1-b8f2-4e9b-af10-ec961f68fcac.jpg',
              'https://image2url.com/r2/default/images/1772518007824-f6db0bc1-db20-45a5-bd0c-5445c3e723ba.jpg',
              'https://image2url.com/r2/default/images/1772518710586-00251ba8-1623-4795-be98-36af43aaa0fa.jpg',
              'https://image2url.com/r2/default/images/1772518739040-c50da839-2345-4f18-b814-cd446efe85f4.jpg'
            ],
            description: '水泥、骨材經拌合壓鑄後脫模成型，隨即用水洗去表層附著之水泥，露出天然石之美麗質感', 
            details: {
              '色彩選擇': '黑 / 黃(可客製面材及文字)',
              '主要材質': '水泥、天然石材粒料',
              '設計風格': '洗石面 / 崗晶石面'
            },
            cases: [
              { location: '苗栗 蕉埔國小', type: '通學步道', desc: '高壓磚通學步道搭配客製鍍鋅溝蓋板及洗石排水磚' },
              { location: '台東 紅葉村', type: '人行道', desc: '高壓磚鋪面搭配洗石面路緣石及洗石面水溝蓋板' }
            ],
            featured: false   
          },
          // 10. 客製化藝術陶雕
          {
            id: 'CR',
            name: '客製化陶雕',
            category: '客製化藝術陶雕', 
            price: 0, 
            unit: 'm²',
            image: 'https://image2url.com/r2/default/images/1772429987092-42414003-27ca-4d83-b283-6d56dd6b5fd1.jpg',
            gallery: [
              'https://image2url.com/r2/default/images/1772430030156-2cf909d4-2737-48d9-a959-31eca136ea48.jpg',
              'https://image2url.com/r2/default/images/1772431031430-bcaf90e5-8231-4f80-81a3-4abb096cb954.jpg',
              'https://image2url.com/r2/default/images/1772431951528-8eebdafb-922c-47e8-874f-03e96b351899.jpg',
              'https://image2url.com/r2/default/images/1772431869515-8d00bde3-699e-431e-9452-c229d19b49ba.jpg',
              'https://image2url.com/r2/default/images/1772433334452-dae53012-973e-4015-b09a-6cd9666d6eae.jpg'
            ],
            description: '將牆面提升豐富性，可依照需求設計客製，經高溫窯燒成型。具備陶質材料特有的溫潤質感，能將歷史、生態或抽象意象保存於建築之中。', 
            details: {
              '藝術風格': '浮雕、彩釉彩繪',
              '耐候特性': '不褪色、耐磨 / 耐刮',
              '配合設計': '可結合抿石子/手工創作圖騰/彩色砂圖騰進行多材質異適設計',
              '適用範圍': '文化牆、入口標誌牆、景觀地標設施'
            },
            cases: [
              { location: '苗栗 三義勝興', type: '休閒步道', desc: '塑木平台步道欄杆結合陶雕設計' },
              { location: '嘉義 布袋菜舖里', type: '司令台牆面美化', desc: '手工創作圖騰結合陶雕設計美化' },
              { location: '苗栗 三灣', type: '防坡牆面美化', desc: '抿石子結合陶雕設計美化' },
              { location: '苗栗 山柑社區', type: '牆面美化', desc: '社區活動中心' },
            ],
            featured: true
          }
        ];

        const CATEGORIES = [
          '全部', '透水模組', '高壓混凝土磚', '路緣石/界石', '壓花地坪/紙模地坪', 
          '客製化藝術陶雕', '手工創作圖騰/彩色砂圖騰', '牆磚系列', '欄杆系列', '塑木系列', '其他'
        ];

        const App = () => {
          const [activeCategory, setActiveCategory] = useState('全部');
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedProduct, setSelectedProduct] = useState(null);
          const [isContactOpen, setIsContactOpen] = useState(false);
          const [currentSlide, setCurrentSlide] = useState(0);
          const [showTopBtn, setShowTopBtn] = useState(false);

          // 精確捲動到產品區域
          const scrollToContent = () => {
            const element = document.getElementById('main-content');
            if (element) {
              const yOffset = -100; 
              const y = element.getBoundingClientRect().top + window.pageYOffset + yOffset;
              window.scrollTo({ top: y, behavior: 'smooth' });
            }
          };

          // 捲動至最頂部
          const scrollToTop = () => {
            window.scrollTo({
              top: 0,
              behavior: 'smooth',
            });
          };

          const filteredProducts = useMemo(() => {
            return PRODUCTS_DB.filter(product => {
              if (!product || !product.name) return false;
              const matchesCategory = activeCategory === '全部' || product.category === activeCategory;
              const matchesSearch = 
                product.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                product.description.toLowerCase().includes(searchQuery.toLowerCase());
              return matchesCategory && matchesSearch;
            });
          }, [activeCategory, searchQuery]);

          useEffect(() => {
            const timer = setInterval(() => {
              setCurrentSlide((prev) => (prev + 1) % SLIDES.length);
            }, 5000);
            return () => clearInterval(timer);
          }, []);

          // 監聽滾動事件控制 Top 按鈕顯示
          useEffect(() => {
            const handleScroll = () => {
              if (window.scrollY > 400) {
                setShowTopBtn(true);
              } else {
                setShowTopBtn(false);
              }
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % SLIDES.length);
          const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + SLIDES.length) % SLIDES.length);

          const handleBackToHome = () => {
            setActiveCategory('全部');
            setSearchQuery('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          return (
            <div className="min-h-screen bg-[#FDFCFB] text-slate-800 font-sans selection:bg-stone-200 text-left overflow-x-hidden">
              
              {/* 1. 頂部公告欄 */}
              <div className="bg-stone-900 text-white text-[10px] md:text-xs py-2 px-6 flex justify-between items-center font-bold tracking-widest uppercase overflow-hidden whitespace-nowrap text-left z-50 relative">
                <div className="flex items-center gap-4 animate-pulse text-left">
                  <SVGSparkles className="w-3 h-3 text-blue-400" />
                  <span>場鑄式透水技術 ‧ 定義景觀新高度</span>
                </div>
                <div className="hidden md:flex items-center gap-6 text-left">
                  <div className="flex items-center gap-2">
                    <SVGAward className="w-3 h-3 text-green-400" />
                    <span>內政部認證建材</span>
                  </div>
                  <div className="flex items-center gap-2 text-blue-400">
                    <SVGGlobe className="w-3 h-3" />
                    <span>服務全台工程</span>
                  </div>
                </div>
              </div>

              {/* 導覽列 */}
              <nav className="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-stone-200 shadow-sm text-left font-bold">
                <div className="max-w-7xl mx-auto px-6">
                  <div className="flex justify-between items-center h-20 text-left">
                    <div className="flex items-center gap-3 group cursor-pointer" onClick={handleBackToHome}>
                      <div className="bg-stone-900 p-2 rounded-lg group-hover:bg-blue-600 transition-colors">
                        <SVGMountain className="text-white w-6 h-6" />
                      </div>
                      <div className="flex flex-col text-left">
                        <span className="text-xl font-black tracking-widest text-stone-900 uppercase leading-none">陶無二<span className="text-stone-500">客製工廠</span></span>
                        <span className="text-[10px] text-stone-400 font-bold tracking-[0.2em] uppercase mt-1">TAO-WU-ER CUSTOM FACTORY</span>
                      </div>
                    </div>
                    
                    <div className="relative hidden lg:flex items-center flex-1 max-w-lg mx-12">
                      <input
                        type="text"
                        placeholder="搜尋產品系列..."
                        className="w-full pl-12 pr-4 py-2.5 bg-stone-100 border-none rounded-full focus:ring-2 focus:ring-blue-500/20 transition-all text-sm outline-none font-bold"
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                      />
                      <SVGSearch className="absolute left-4 text-stone-400 w-4 h-4" />
                    </div>

                    <div className="flex items-center gap-2 sm:gap-4 text-left">
                      <button 
                        onClick={() => setIsContactOpen(true)}
                        className="px-4 sm:px-6 py-2.5 bg-stone-900 text-white rounded-full text-[10px] sm:text-xs font-bold hover:bg-blue-600 transition-all shadow-lg flex items-center gap-2 text-left"
                      >
                        <SVGMail className="w-4 h-4 shrink-0" /> 聯繫詢價
                      </button>
                      <button 
                        onClick={handleBackToHome}
                        className="px-3 sm:px-4 py-2.5 bg-white border border-stone-200 text-stone-900 rounded-full hover:bg-stone-50 transition-all shadow-sm"
                      >
                        <SVGHome className="w-4 h-4" /> 
                      </button>
                    </div>
                  </div>
                </div>
              </nav>

              {/* 2. 動態輪播 Banner */}
              {activeCategory === '全部' && !searchQuery && (
                <header className="relative h-[450px] md:h-[650px] bg-stone-900 overflow-hidden text-left font-bold">
                  {SLIDES.map((slide, index) => (
                    <div 
                      key={index}
                      className={`absolute inset-0 transition-opacity duration-1000 ease-in-out ${index === currentSlide ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}
                    >
                      <div className="absolute inset-0 text-left">
                        <img src={slide.image} className="w-full h-full object-cover scale-105" alt={slide.title} />
                        <div className="absolute inset-0 bg-gradient-to-r from-stone-950/95 via-stone-950/60 to-transparent"></div>
                      </div>
                      
                      <div className="relative z-20 max-w-7xl mx-auto px-6 h-full flex flex-col justify-center text-left text-white">
                        <div className={`max-w-2xl transform transition-transform duration-1000 ${index === currentSlide ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                          <div className="flex items-center gap-3 mb-6 text-left">
                            <div className="h-[1px] w-12 bg-blue-500"></div>
                            <span className="text-blue-400 text-xs md:text-sm font-black tracking-[0.3em] uppercase">{slide.subtitle}</span>
                          </div>
                          <h1 className="text-4xl md:text-7xl font-black mb-6 leading-tight tracking-tighter text-left">
                            {slide.title}
                          </h1>
                          <p className="text-stone-300 text-sm md:text-lg mb-10 leading-relaxed font-light text-left">
                            {slide.desc}
                          </p>
                          <div className="flex flex-wrap gap-4 text-left">
                            <button 
                              onClick={() => {
                                setActiveCategory(slide.category);
                                setTimeout(scrollToContent, 50); 
                              }}
                              className="px-8 py-4 bg-white text-stone-900 rounded-2xl font-black hover:bg-blue-600 hover:text-white transition-all shadow-xl flex items-center gap-2 text-left"
                            >
                              查看詳細目錄 <SVGArrowRight className="w-5 h-5" />
                            </button>
                            <div className="px-6 py-4 border border-white/20 rounded-2xl font-bold bg-white/5 backdrop-blur-sm text-[10px] md:text-xs flex items-center text-left">
                              {slide.tag}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}

                  <button onClick={prevSlide} className="absolute left-6 top-1/2 -translate-y-1/2 z-30 p-3 bg-white/10 hover:bg-white/20 text-white rounded-full backdrop-blur-md border border-white/10 hidden md:block transition-all text-left">
                    <SVGChevronLeft className="w-6 h-6" />
                  </button>
                  <button onClick={nextSlide} className="absolute right-6 top-1/2 -translate-y-1/2 z-30 p-3 bg-white/10 hover:bg-white/20 text-white rounded-full backdrop-blur-md border border-white/10 hidden md:block transition-all text-left">
                    <SVGChevronRight className="w-6 h-6" />
                  </button>

                  <div className="absolute bottom-10 left-6 z-30 flex gap-3 text-left">
                    {SLIDES.map((_, i) => (
                      <button key={i} onClick={() => setCurrentSlide(i)} className={`h-1 transition-all duration-500 rounded-full ${i === currentSlide ? 'w-12 bg-blue-500' : 'w-4 bg-white/30 hover:bg-white/50'}`} />
                    ))}
                  </div>
                </header>
              )}

                  <aside className="w-full lg:w-64 shrink-0 text-left font-bold">
                    <div className="sticky top-28 text-left">
                      <h3 className="text-[10px] font-black text-stone-400 uppercase tracking-[0.2em] mb-6 px-4 text-left font-bold">產品系列</h3>
                      <div className="flex lg:flex-col gap-1 overflow-x-auto pb-6 lg:pb-0 no-scrollbar text-left font-bold">
                        {CATEGORIES.map(category => (
                          <button
                            key={category}
                            onClick={() => {
                              setActiveCategory(category);
                              scrollToContent();
                            }}
                            className={`flex items-center justify-between px-4 py-3.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap text-left ${
                              activeCategory === category
                                ? 'bg-stone-900 text-white shadow-xl translate-x-1'
                                : 'text-stone-500 hover:bg-stone-100'
                            }`}
                          >
                            <span>{category}</span>
                            <span className={`text-[10px] ml-4 font-black ${activeCategory === category ? 'opacity-50' : 'text-stone-300'}`}>
                              {PRODUCTS_DB.filter(p => category === '全部' || p.category === category).length}
                            </span>
                          </button>
                        ))}
                      </div>
                    </div>
                  </aside>

                  <div className="flex-1 text-left">
                    <header className="mb-12 border-b border-stone-100 pb-8 text-left font-bold">
                      <h2 className="text-4xl font-black text-stone-900 tracking-tight text-left uppercase">{activeCategory}</h2>
                      <div className="flex items-center gap-2 mt-2 text-left">
                         <div className="h-1 w-8 bg-blue-600 rounded-full"></div>
                         <p className="text-stone-400 text-[10px] uppercase tracking-widest font-black text-left italic">Landscape Engineering & Architecture</p>
                      </div>
                    </header>

                    {filteredProducts.length > 0 ? (
                      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 text-left font-bold">
                        {filteredProducts.map(product => (
                          <div 
                            key={product.id}
                            className="group flex flex-col cursor-pointer bg-white rounded-3xl overflow-hidden border border-stone-100 hover:border-blue-100 hover:shadow-2xl transition-all duration-500 text-left"
                            onClick={() => setSelectedProduct(product)}
                          >
                            <div className="relative aspect-[4/5] overflow-hidden bg-stone-50 text-left">
                              <img src={product.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt={product.name} />
                              {product.featured && <div className="absolute top-4 left-4 bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase shadow-lg text-left">熱門產品</div>}
                              {(product.details?.['認證項目']?.includes('標章') || product.details?.['環保認證']) && <div className="absolute top-4 right-4 bg-green-600 text-white p-1.5 rounded-lg shadow-lg text-left font-bold"><SVGAward className="w-4 h-4" /></div>}
                            </div>
                            
                            <div className="p-6 flex-1 flex flex-col text-left">
                              <div className="flex items-center justify-between mb-2 text-left font-bold">
                                <span className="text-[10px] font-black text-blue-600 uppercase bg-blue-50 px-2 py-0.5 rounded text-left font-bold">{product.category}</span>
                                <span className="text-[10px] font-bold text-stone-300 text-left tracking-widest font-bold">ID: {product.id}</span>
                              </div>
                              <h3 className="text-xl font-bold text-stone-900 mb-3 group-hover:text-blue-600 transition-colors text-left font-bold">
                                {product.name}
                              </h3>
                              <p className="text-stone-500 text-sm mb-6 line-clamp-2 leading-relaxed text-left font-normal italic font-bold">
                                {product.description}
                              </p>
                              <div className="mt-auto flex items-center justify-between text-left font-bold">
                                <span className="text-sm font-black text-stone-900 flex items-center gap-1 text-left font-bold">
                                  <SVGCheckCircle2 className="w-4 h-4 text-green-500" /> 認證建材
                                </span>
                                <div className="p-2 bg-stone-50 rounded-full group-hover:bg-stone-900 group-hover:text-white transition-all text-left">
                                  <SVGChevronRight className="w-5 h-5" />
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-40 bg-white rounded-[3rem] border border-stone-100 text-left font-bold">
                        <SVGInfo className="w-12 h-12 text-stone-200 mx-auto mb-4 font-bold" />
                        <h3 className="text-lg font-bold text-stone-400 text-center uppercase tracking-widest font-bold">資料整理中...</h3>
                      </div>
                    )}
                  </div>
                </div>
              </main>

              {/* 產品詳情 Modal */}
              {selectedProduct && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 text-left animate-in fade-in duration-300 font-bold">
                  <div className="absolute inset-0 bg-stone-950/90 backdrop-blur-md" onClick={() => setSelectedProduct(null)}></div>
                  
                  <div className="relative bg-white w-full max-w-6xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh] text-left animate-in zoom-in duration-300 font-bold">
                    
                    {/* 關閉按鈕：固定在 Modal 右上角 */}
                    <button 
                      onClick={() => setSelectedProduct(null)} 
                      className="absolute top-6 right-6 z-[110] p-3 bg-white/80 backdrop-blur hover:bg-white hover:text-stone-900 text-stone-500 rounded-full shadow-lg transition-all text-left font-bold"
                    >
                      <SVGX className="w-6 h-6" />
                    </button>
                    
                    {/* 統一捲動容器 */}
                    <div className="overflow-y-auto h-full scroll-smooth font-bold">
                      <div className="flex flex-col md:flex-row min-h-full font-bold">
                        
                        {/* 左側：封面圖與案例 */}
                        <div className="w-full md:w-5/12 bg-stone-50 flex flex-col text-left border-r border-stone-100 font-bold">
                          <img src={selectedProduct.image} className="w-full h-auto object-cover border-b border-stone-100" alt={selectedProduct.name} />
                          <div className="p-8 bg-stone-900 text-white text-left font-bold flex-1 font-bold">
                            <h4 className="text-[10px] font-black text-stone-500 uppercase tracking-[0.4em] mb-6 text-left font-bold tracking-widest uppercase font-bold">實績案例 / PROJECT CASES</h4>
                            <div className="space-y-6 text-left font-normal font-bold">
                              {selectedProduct.cases?.map((c, i) => (
                                <div key={i} className="flex gap-4 p-4 bg-white/5 rounded-2xl border border-white/5 text-left font-normal font-bold">
                                  <SVGMapPin className="text-blue-400 w-4 h-4 shrink-0 mt-1 font-bold" />
                                  <div className="text-left font-normal font-bold">
                                    <div className="text-sm font-bold text-left font-bold">{c.location}</div>
                                    <div className="text-[10px] text-blue-500 font-bold uppercase mb-1 tracking-widest text-left font-bold font-bold">{c.type}</div>
                                    <div className="text-xs text-stone-400 leading-relaxed text-left font-normal font-bold">{c.desc}</div>
                                  </div>
                                </div>
                              ))}
                              {!selectedProduct.cases && (
                                <div className="p-6 border border-white/10 rounded-2xl bg-white/5 text-left font-bold">
                                  <SVGConstruction className="w-8 h-8 text-blue-400 mb-4 text-left font-bold" />
                                  <p className="text-sm leading-relaxed text-stone-300 text-left font-light italic font-bold">
                                    提供專業配置諮詢，請聯繫我們的景觀設計顧問。
                                  </p>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                        
                        {/* 右側：詳細規格 */}
                        <div className="w-full md:w-7/12 p-10 md:p-14 flex flex-col text-left bg-white font-bold font-bold">
                          <div className="mb-10 text-left font-bold">
                            <div className="flex flex-wrap gap-2 mb-4 text-left font-bold">
                              <span className="inline-block px-3 py-1 bg-stone-100 text-stone-600 rounded-lg text-[10px] font-black uppercase tracking-widest text-left font-bold">
                                {selectedProduct.category}
                              </span>
                              {selectedProduct.details?.['認證項目'] && <span className="inline-block px-3 py-1 bg-green-100 text-green-700 rounded-lg text-[10px] font-black uppercase tracking-widest text-left font-bold tracking-widest font-bold">認證標章</span>}
                            </div>
                            <h2 className="text-4xl font-black text-stone-900 mb-6 leading-tight text-left font-bold">{selectedProduct.name}</h2>
                            <div className="flex items-center gap-6 text-left font-bold">
                               <div className="flex items-center gap-2 text-stone-500 text-left font-bold font-bold"><SVGSparkles className="w-5 h-5 font-bold" /><span className="text-sm font-bold text-left font-bold">優質工法</span></div>
                               <div className="flex items-center gap-2 text-stone-500 text-left font-bold font-bold"><SVGCheckCircle2 className="w-5 h-5 text-green-500 font-bold" /><span className="text-sm font-bold text-left font-bold">檢驗合格</span></div>
                            </div>
                          </div>
                          
                          <div className="space-y-12 text-left flex-1 font-bold font-bold">
                            <div className="text-left font-bold">
                              <h4 className="text-[10px] font-black text-stone-300 uppercase tracking-[0.4em] mb-4 text-left font-bold tracking-widest uppercase font-bold">產品介紹 / DESCRIPTION</h4>
                              <p className="text-stone-600 leading-relaxed text-lg font-light text-left font-normal italic font-bold">
                                {selectedProduct.description}
                              </p>
                            </div>
                            
                            <div className="text-left font-bold font-bold">
                              <h4 className="text-[10px] font-black text-stone-300 uppercase tracking-[0.4em] mb-4 text-left font-bold tracking-widest uppercase font-bold">技術規格 / SPECIFICATIONS</h4>
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-3 text-left font-bold">
                                {selectedProduct.details && Object.entries(selectedProduct.details).map(([key, value]) => (
                                  <div key={key} className="flex flex-col py-3 border-b border-stone-50 text-left font-bold">
                                    <span className="text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1 text-left font-bold tracking-widest uppercase font-bold">{key}</span>
                                    <span className="text-sm font-black text-stone-900 leading-tight text-left font-bold font-bold">{value}</span>
                                  </div>
                                ))}
                              </div>
                            </div>

                            {selectedProduct.gallery && selectedProduct.gallery.length > 0 && (
                              <div className="text-left font-bold">
                                <h4 className="text-[10px] font-black text-stone-300 uppercase tracking-[0.4em] mb-6 flex items-center gap-2 text-left font-bold tracking-widest uppercase font-bold font-bold"><SVGImageIcon className="w-4 h-4 font-bold" /> 產品展示 / GALLERY</h4>
                                <div className="grid grid-cols-2 gap-4 text-left font-bold">
                                  {selectedProduct.gallery.map((imgUrl, index) => (
                                    <div key={index} className="aspect-video rounded-2xl overflow-hidden bg-stone-100 group shadow-inner text-left font-bold">
                                      <img src={imgUrl} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 text-left font-bold font-bold" alt="Gallery" />
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>

                          <div className="mt-12 text-left font-bold">
                            <button onClick={() => setIsContactOpen(true)} className="w-full py-5 bg-stone-900 text-white rounded-2xl font-bold hover:bg-blue-600 transition-all flex items-center justify-center gap-3 shadow-xl text-left font-bold tracking-widest font-bold">
                               聯繫諮詢報價 <SVGArrowRight className="w-4 h-4 text-left font-bold" />
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 聯繫視窗 Modal */}
              {isContactOpen && (
                <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 text-left font-bold">
                  <div className="absolute inset-0 bg-stone-950/95 backdrop-blur-md font-bold" onClick={() => setIsContactOpen(false)}></div>
                  <div className="relative bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden p-8 md:p-12 text-center animate-in slide-in-from-bottom duration-300 text-left font-bold font-bold">
                    <button onClick={() => setIsContactOpen(false)} className="absolute top-6 right-6 p-2 hover:bg-stone-100 rounded-full transition-all text-left font-bold font-bold font-bold"><SVGX className="w-6 h-6 text-stone-400 text-left font-bold" /></button>
                    <div className="mb-10 flex flex-col items-center text-left font-bold font-bold">
                      <div className="bg-blue-600 p-4 rounded-3xl mb-6 shadow-xl shadow-blue-100 text-left font-bold"><SVGMountain className="text-white w-10 h-10 text-left font-bold" /></div>
                      <h2 className="text-3xl font-black text-stone-900 mb-2 text-left font-bold tracking-widest uppercase font-bold">陶無二客製工廠</h2>
                      <p className="text-stone-400 text-sm font-medium uppercase tracking-widest text-center text-left font-bold italic font-bold">Contact Information</p>
                    </div>
                    <div className="space-y-4 mb-10 text-left font-bold font-bold">
                      {/* 電子郵件連結：跳轉至 Gmail 撰寫頁面 */}
                      <a 
                        href="https://mail.google.com/mail/?view=cm&fs=1&to=home860118@gmail.com" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="flex items-center gap-4 p-5 bg-stone-50 rounded-2xl border border-stone-100 hover:border-blue-500 hover:bg-white transition-all group text-left font-bold"
                      >
                        <div className="p-3 bg-white rounded-xl shadow-sm group-hover:bg-blue-600 group-hover:text-white transition-all text-left">
                          <SVGMail className="w-5 h-5 text-blue-600 group-hover:text-white text-left" />
                        </div>
                        <div className="text-left">
                          <span className="text-[10px] font-black text-stone-300 uppercase tracking-widest block text-left">電子郵件</span>
                          <span className="text-sm font-bold text-stone-900 text-left">home860118@gmail.com</span>
                        </div>
                      </a>
                      <a href="tel:0426363388" className="flex items-center gap-4 p-5 bg-stone-50 rounded-2xl border border-stone-100 hover:border-blue-500 hover:bg-white transition-all group text-left font-bold">
                        <div className="p-3 bg-white rounded-xl shadow-sm group-hover:bg-blue-600 group-hover:text-white transition-all text-left">
                          <SVGPhone className="w-5 h-5 text-blue-600 group-hover:text-white text-left" />
                        </div>
                        <div className="text-left">
                          <span className="text-[10px] font-black text-stone-300 uppercase tracking-widest block text-left">聯繫電話</span>
                          <span className="text-sm font-bold text-stone-900 text-left">04-26363388</span>
                        </div>
                      </a>
                      {/* 公司地址連結：跳轉至 Google Maps */}
                      <a 
                        href="https://www.google.com/maps/search/?api=1&query=434023+臺中市龍井區茄投路一段1巷35號"
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="flex items-center gap-4 p-5 bg-stone-50 rounded-2xl border border-stone-100 hover:border-blue-500 hover:bg-white transition-all group text-left font-bold"
                      >
                        <div className="p-3 bg-white rounded-xl shadow-sm group-hover:bg-blue-600 group-hover:text-white transition-all text-left">
                          <SVGMapPin className="w-5 h-5 text-blue-600 group-hover:text-white text-left" />
                        </div>
                        <div className="text-left">
                          <span className="text-[10px] font-black text-stone-300 uppercase tracking-widest block text-left tracking-widest">公司地址</span>
                          <span className="text-sm font-bold text-stone-900 leading-tight text-left tracking-widest">434023 臺中市龍井區茄投路一段1巷35號</span>
                        </div>
                      </a>
                    </div>
                    <button onClick={() => setIsContactOpen(false)} className="w-full py-4 bg-stone-900 text-white rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-lg text-mid font-bold uppercase tracking-widest">關閉視窗</button>
                  </div>
                </div>
              )}

              {/* 回到頂部按鈕 */}
              {showTopBtn && (
                <button
                  onClick={scrollToTop}
                  className="fixed bottom-8 right-8 z-50 p-4 bg-blue-600 text-white rounded-full shadow-2xl hover:bg-stone-900 transition-all duration-300 hover:-translate-y-2 group"
                  aria-label="回到頂部"
                >
                  <SVGArrowUp className="w-6 h-6 group-hover:animate-bounce" />
                </button>
              )}

              {/* 頁尾 */}
              <footer className="bg-stone-100 py-16 mt-20 border-t border-stone-200 text-center px-6 font-bold">
                <div className="flex justify-center gap-2 mb-6 opacity-20 items-center">
                  <SVGMountain className="w-5 h-5" />
                  <span className="font-black tracking-widest uppercase italic text-stone-900">陶無二客製工廠</span>
                </div>
                <p className="text-stone-300 text-[10px] space-y-1 uppercase tracking-widest font-bold">
                  © 2026 陶無二客製工廠股份有限公司 | 434023 臺中市龍井區茄投路一段1巷35號 ‧ 04-26363388
                </p>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
